name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Trigger when a version tag is pushed (e.g., v1.0.0)

permissions:
  contents: write # Needed to create a GitHub Release

jobs:
  build:
    name: Build and Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mkcert-rust
            asset_name: mkcert-rust-linux-amd64
          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: mkcert-rust
            asset_name: mkcert-rust-darwin-amd64
          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: mkcert-rust
            asset_name: mkcert-rust-darwin-arm64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mkcert-rust.exe
            asset_name: mkcert-rust-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install NASM (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
